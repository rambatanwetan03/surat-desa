<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Nomor Surat Desa Rambatan Wetan (Cloud)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { padding: 0; background: white; }
            .print-header { display: block !important; text-align: center; margin-bottom: 20px; }
            table { width: 100%; border-collapse: collapse; }
            th, td { border: 1px solid black !important; padding: 8px; }
        }
        .print-header { display: none; }
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8);
            z-index: 1000;
            justify-content: center; align-items: center;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div id="loading" class="loading-overlay flex-col">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-800 mb-2"></div>
        <p class="text-blue-800 font-semibold">Memproses data...</p>
    </div>

    <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
        <header class="bg-blue-800 text-white p-6 text-center">
            <h1 class="text-2xl md:text-3xl font-bold uppercase tracking-wide">Data Nomor Urut Surat</h1>
            <h2 class="text-xl">Pemerintah Desa Rambatan Wetan</h2>
            <p class="text-sm opacity-80 mt-1 text-yellow-200">Mode Cloud: Google Sheets Sync (JSONP)</p>
        </header>

        <div class="p-6 border-b no-print">
            <div id="alert-box" class="hidden mb-4 p-4 bg-red-100 border-l-4 border-red-500 text-red-700 font-bold uppercase">
                NOMOR INI SUDAH ADA!
            </div>

            <form id="surat-form" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Tanggal</label>
                    <input type="date" id="tanggal" required class="w-full p-2 border rounded outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Kode Klasifikasi</label>
                    <input type="text" id="kode" placeholder="141" required class="w-full p-2 border rounded outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Nomor Urut</label>
                    <input type="number" id="urut" placeholder="001" required class="w-full p-2 border rounded outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Perihal</label>
                    <input type="text" id="perihal" placeholder="Keterangan Surat" required class="w-full p-2 border rounded outline-none">
                </div>
                <div class="md:col-span-4 flex justify-end gap-2 mt-2">
                    <button type="button" onclick="refreshData()" class="px-4 py-2 bg-gray-500 text-white rounded text-sm font-semibold hover:bg-gray-600 transition">Muat Ulang Data</button>
                    <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded font-bold hover:bg-blue-700 transition">Simpan ke Google Sheets</button>
                </div>
            </form>
        </div>

        <div class="p-6">
            <div class="flex flex-wrap justify-between items-center mb-4 gap-2 no-print">
                <h3 class="text-lg font-bold text-gray-800">Daftar Surat Tercatat</h3>
                <button onclick="exportToPDF()" class="flex items-center gap-1 px-3 py-1.5 bg-red-600 text-white rounded text-sm hover:bg-red-700">Simpan PDF</button>
            </div>

            <div class="print-header">
                <h1 style="font-size: 24px; font-weight: bold;">DATA NOMOR URUT SURAT</h1>
                <h2 style="font-size: 20px;">DESA RAMBATAN WETAN</h2>
                <hr style="margin: 10px 0; border: 1px solid black;">
            </div>

            <div class="overflow-x-auto">
                <table class="w-full border-collapse border border-gray-200">
                    <thead>
                        <tr class="bg-gray-50 text-left">
                            <th class="border p-3 text-sm font-bold">No.</th>
                            <th class="border p-3 text-sm font-bold">Tanggal</th>
                            <th class="border p-3 text-sm font-bold">Nomor Surat</th>
                            <th class="border p-3 text-sm font-bold">Perihal</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
                <div id="empty-state" class="text-center py-10 text-gray-500">Menghubungkan ke database cloud...</div>
            </div>
        </div>
    </div>

    <script>
        // URL Google Apps Script terbaru yang Anda berikan
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwSu2H5GN0VUS2Zp5E6kHvDkxPIzyeCOfbSXI395iUkGjvMcOub9zHFufirKOu7uC3eug/exec";

        let daftarSurat = [];
        const form = document.getElementById('surat-form');
        const tableBody = document.getElementById('table-body');
        const loading = document.getElementById('loading');
        const emptyState = document.getElementById('empty-state');

        document.getElementById('tanggal').valueAsDate = new Date();

        /**
         * Penanganan JSONP Global
         * Google Apps Script harus mengembalikan data dalam format: handleResponse(JSON_DATA)
         */
        window.handleResponse = function(data) {
            console.log("Data diterima melalui JSONP:", data);
            daftarSurat = Array.isArray(data) ? data : [];
            updateTable();
            loading.style.display = 'none';
            // Bersihkan elemen script setelah selesai
            const oldScript = document.getElementById('jsonp-fetcher');
            if (oldScript) oldScript.remove();
        };

        async function refreshData() {
            loading.style.display = 'flex';
            emptyState.innerText = "Mengambil data via JSONP...";
            
            try {
                // Menghapus script lama jika ada
                const oldScript = document.getElementById('jsonp-fetcher');
                if (oldScript) oldScript.remove();

                // Membuat elemen script untuk JSONP (melewati batasan CORS)
                const script = document.createElement('script');
                script.id = 'jsonp-fetcher';
                // Menambahkan parameter callback untuk Apps Script dan t untuk cache-busting
                script.src = `${SCRIPT_URL}?callback=handleResponse&t=${Date.now()}`;
                
                script.onerror = () => {
                    loading.style.display = 'none';
                    showToast("Gagal terhubung. Pastikan Apps Script aktif & di-deploy sebagai 'Anyone'.", "error");
                    emptyState.innerText = "Gagal memuat data cloud.";
                };

                document.body.appendChild(script);

                // Timeout jika server tidak merespon dalam 10 detik
                setTimeout(() => {
                    if (loading.style.display === 'flex') {
                        loading.style.display = 'none';
                        showToast("Koneksi timeout.", "error");
                    }
                }, 10000);

            } catch (err) {
                console.error("JSONP Setup Error:", err);
                loading.style.display = 'none';
            }
        }

        function updateTable() {
            tableBody.innerHTML = '';
            if (daftarSurat.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.innerText = "Belum ada data di Google Sheets.";
            } else {
                emptyState.classList.add('hidden');
                // Urutkan berdasarkan nomor urut secara default
                daftarSurat.sort((a, b) => (parseInt(a.urut) || 0) - (parseInt(b.urut) || 0));
                
                daftarSurat.forEach((item, index) => {
                    const row = document.createElement('tr');
                    row.className = "hover:bg-gray-50 transition border-b";
                    row.innerHTML = `
                        <td class="p-3 text-sm border-r text-center">${index + 1}</td>
                        <td class="p-3 text-sm border-r">${formatTanggal(item.tanggal)}</td>
                        <td class="p-3 text-sm border-r font-mono font-bold text-blue-800">${item.kode}/${item.urut}</td>
                        <td class="p-3 text-sm">${item.perihal}</td>
                    `;
                    tableBody.appendChild(row);
                });
            }
        }

        function formatTanggal(dateStr) {
            try {
                const date = new Date(dateStr);
                if (isNaN(date.getTime())) return dateStr;
                return date.toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' });
            } catch(e) { return dateStr; }
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const newData = {
                action: 'add',
                tanggal: document.getElementById('tanggal').value,
                kode: document.getElementById('kode').value,
                urut: document.getElementById('urut').value,
                perihal: document.getElementById('perihal').value
            };

            const isDuplicate = daftarSurat.some(s => s.kode === newData.kode && s.urut === newData.urut);
            if (isDuplicate) {
                document.getElementById('alert-box').classList.remove('hidden');
                setTimeout(() => document.getElementById('alert-box').classList.add('hidden'), 3000);
                return;
            }

            loading.style.display = 'flex';
            try {
                // Mengirim data menggunakan mode 'no-cors' (paling stabil untuk Apps Script POST)
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newData)
                });
                
                showToast("Data dikirim ke Google Sheets...");
                form.reset();
                document.getElementById('tanggal').valueAsDate = new Date();
                
                // Jeda 3 detik agar database terupdate sebelum muat ulang
                setTimeout(refreshData, 3000);
            } catch (err) {
                console.error("Submit Error:", err);
                showToast("Gagal menyimpan data.", "error");
                loading.style.display = 'none';
            }
        });

        function showToast(message, type = "success") {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-4 right-4 ${type === 'success' ? 'bg-green-600' : 'bg-red-600'} text-white px-6 py-3 rounded-lg shadow-2xl z-50 transition-all duration-300`;
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        async function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("DATA NOMOR URUT SURAT - DESA RAMBATAN WETAN", 10, 20);
            let y = 35;
            daftarSurat.forEach((item, index) => {
                doc.text(`${index + 1}. [${item.tanggal}] ${item.kode}/${item.urut} - ${item.perihal}`, 15, y);
                y += 10;
                if (y > 280) { doc.addPage(); y = 20; }
            });
            doc.save("Laporan_Surat_Desa.pdf");
        }

        window.onload = refreshData;
    </script>
</body>
</html>
