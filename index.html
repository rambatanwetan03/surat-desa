<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <title>E-Penomoran Desa Rambatan Wetan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .btn-touch { min-height: 48px; }
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        @media (max-width: 640px) {
            input, select { font-size: 16px !important; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

    <!-- Modal Notifikasi -->
    <div id="msg-modal" class="modal-overlay">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl text-center">
            <div id="msg-icon" class="mb-4 flex justify-center"></div>
            <h3 id="msg-title" class="text-xl font-bold mb-2">Pemberitahuan</h3>
            <p id="msg-body" class="text-slate-600 mb-6 text-sm"></p>
            <button onclick="closeMsg()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700">Tutup</button>
        </div>
    </div>

    <!-- Login Screen -->
    <div id="login-screen" class="fixed inset-0 bg-blue-900 flex items-center justify-center z-[5000] p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center mx-auto mb-4 text-blue-600">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v4h8z"></path></svg>
                </div>
                <h2 class="text-2xl font-black text-blue-900 uppercase tracking-tighter">E-Penomoran</h2>
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Desa Rambatan Wetan</p>
            </div>
            
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Username</label>
                    <input type="text" id="username" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="Masukkan Username">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Password</label>
                    <div class="relative">
                        <input type="password" id="password" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="Masukkan Password">
                        <button type="button" onclick="togglePass()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400">
                            <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase tracking-wider hover:bg-blue-700 transition shadow-lg btn-touch">Masuk Sistem</button>
                <p id="error-text" class="hidden text-center text-red-500 text-xs font-bold mt-2 italic">Username atau Password salah!</p>
            </form>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="app-container" class="hidden pb-20">
        <nav class="bg-blue-900 text-white p-4 sticky top-0 z-40 shadow-xl">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="hidden sm:block w-8 h-8 bg-blue-700 rounded-lg flex items-center justify-center text-xs font-black">RW</div>
                    <div>
                        <h1 class="font-black text-sm leading-tight uppercase">Admin Penomoran</h1>
                        <p class="text-[9px] text-blue-300 font-bold uppercase tracking-widest">Rambatan Wetan</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="logout()" class="bg-red-500/20 hover:bg-red-500 border border-red-500/50 text-red-100 px-3 py-1.5 rounded-lg text-[10px] font-bold transition-all">LOGOUT</button>
                </div>
            </div>
        </nav>

                    UNDUH PDF
                </button>
                <button onclick="backupData()" class="bg-amber-500 text-white px-5 py-3 rounded-xl text-xs font-bold hover:bg-amber-600 transition">BACKUP JSON</button>
                <label class="cursor-pointer bg-slate-200 text-slate-700 px-5 py-3 rounded-xl text-xs font-bold hover:bg-slate-300 transition">
                    RESTORE JSON
                    <input type="file" id="restore-input" class="hidden" accept=".json" onchange="restoreData(event)">
                </label>
                <button onclick="confirmReset()" class="bg-red-50 text-red-600 px-5 py-3 rounded-xl text-xs font-bold hover:bg-red-100 transition ml-auto">RESET SEMUA</button>
            </div>

            <!-- Tabel Data -->
            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-5 border-b border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                    <div>
                        <h3 class="font-black text-slate-400 text-[10px] uppercase tracking-widest">Data Penomoran Terakhir</h3>
                        <div class="bg-blue-50 text-blue-600 px-3 py-1 mt-1 rounded-full text-[10px] font-bold uppercase inline-block">Total: <span id="counter">0</span></div>
                    </div>
                    <!-- MENU PENCARIAN -->
                    <div class="relative w-full md:w-64">
                        <input type="text" id="search-input" onkeyup="filterData()" placeholder="Cari Perihal atau Nomor..." class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        <div class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>

                                <th class="p-4 text-[10px] font-bold text-slate-400 uppercase">Nomor</th>
                                <th class="p-4 text-[10px] font-bold text-slate-400 uppercase">Perihal</th>
                                <th class="p-4 text-center text-[10px] font-bold text-slate-400 uppercase">Aksi</th>

    <!-- Global Loader -->
    <div id="loader" class="hidden fixed inset-0 bg-white/80 z-[6000] flex items-center justify-center">
        <div class="text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-900 border-t-transparent mx-auto mb-2"></div>
            <p class="text-[10px] font-bold text-blue-900 uppercase">Memproses Data...</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://frrguknttghhnulhidtl.supabase.co";
        const SUPABASE_KEY = "sb_publishable_1q-J0-kJWnarTudRTH8vlQ_qw_kTilk";
        const LOGIN = { u: "KLIWON03", p: "RAMWET03" };

        let db = null;
        let dataSurat = [];

        function togglePass() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18"/>';
            } else {
                input.type = 'password';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
            }
        }

        function showMsg(title, text, type = 'info') {
            document.getElementById('msg-title').innerText = title;
            document.getElementById('msg-body').innerText = text;
            const iconWrap = document.getElementById('msg-icon');
            iconWrap.innerHTML = type === 'error' 
                ? '<div class="bg-red-100 text-red-500 p-3 rounded-full"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg></div>'
                : '<div class="bg-blue-100 text-blue-500 p-3 rounded-full"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>';
            document.getElementById('msg-modal').style.display = 'flex';
        }

        function closeMsg() { document.getElementById('msg-modal').style.display = 'none'; }

        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value.toUpperCase();
            const p = document.getElementById('password').value.toUpperCase();
            
            if (u === LOGIN.u && p === LOGIN.p) {
                sessionStorage.setItem('desa_auth', 'true');
                initApp();
            } else {
                document.getElementById('error-text').classList.remove('hidden');
            }
        };

        function initApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            document.getElementById('tgl').valueAsDate = new Date();
            
            db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            fetchData();
        }

        function logout() { sessionStorage.clear(); location.reload(); }

        async function fetchData() {
            showLoader(true);
            try {
                const { data, error } = await db.from('surat').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                dataSurat = data || [];
                renderTable(dataSurat);
            } catch (e) { console.error(e); }
            showLoader(false);
        }

        function renderTable(displayData = dataSurat) {
            const body = document.getElementById('table-body');
            body.innerHTML = '';
            document.getElementById('counter').innerText = displayData.length;

            displayData.forEach((s) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition";
                tr.innerHTML = `
                    <td class="p-4 font-semibold text-slate-500 text-xs">${s.tanggal}</td>
                    <td class="p-4"><span class="bg-blue-50 text-blue-700 px-2 py-1 rounded font-bold text-xs">${s.kode}/${s.urut}</span></td>
                    <td class="p-4 text-xs font-medium text-slate-600">${s.perihal}</td>
                    <td class="p-4 text-center">
                        <div class="flex gap-2 justify-center">
                            <button onclick="printRow('${s.id}')" class="text-blue-500 p-2 rounded-lg hover:bg-blue-50 transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg></button>
                            <button onclick="deleteRow('${s.id}')" class="text-red-400 p-2 rounded-lg hover:bg-red-50 transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
                        </div>
                    </td>
                `;
                body.appendChild(tr);
            });
        }

        function filterData() {
            const keyword = document.getElementById('search-input').value.toLowerCase();
            const filtered = dataSurat.filter(s => {
                const combined = `${s.kode}/${s.urut} ${s.perihal}`.toLowerCase();
                return combined.includes(keyword);
            });
            renderTable(filtered);
        }

        function showLoader(show) {
            document.getElementById('loader').classList.toggle('hidden', !show);
        }

        // Dummy/Placeholder functions for those referenced in your original but logic wasn't fully provided
        function printRow(id) { console.log("Print ID:", id); }
        async function deleteRow(id) { 
            if(confirm("Hapus nomor ini?")) {
                showLoader(true);
                await db.from('surat').delete().eq('id', id);
                fetchData();
            }
        }
        function backupData() { console.log("Backup logic"); }
        function restoreData(e) { console.log("Restore logic"); }
        function confirmReset() { console.log("Reset logic"); }
        function downloadPDF() { console.log("PDF logic"); }

        document.getElementById('surat-form').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                tanggal: document.getElementById('tgl').value,
                kode: document.getElementById('kat').value,
                urut: parseInt(document.getElementById('urut').value).toString().padStart(3, '0'),
                perihal: document.getElementById('perihal').value
            };

            const ganda = dataSurat.filter(s => s.kode === payload.kode && s.urut === payload.urut);
            if (ganda.length > 0) {
                showMsg("Nomor Ganda!", `Nomor ${payload.kode}/${payload.urut} sudah ada.`, 'error');
                return;
            }

            showLoader(true);
            const { error } = await db.from('surat').insert([payload]);
            if (error) {
                showMsg("Error", error.message, 'error');
            } else {
                showMsg("Berhasil", "Nomor surat berhasil disimpan.");
                document.getElementById('surat-form').reset();
                document.getElementById('tgl').valueAsDate = new Date();
                fetchData();
            }
            showLoader(false);
        };
    </script>
</body>
