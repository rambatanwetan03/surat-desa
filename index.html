<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Penomoran Desa</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

</head>

<body class="bg-slate-100">

<!-- LOGIN -->
<div id="login" class="h-screen flex items-center justify-center bg-blue-900">
    <div class="bg-white p-6 rounded-xl w-80">
        <h2 class="text-xl font-bold mb-4 text-center">LOGIN ADMIN</h2>
        <input id="user" placeholder="Username" class="w-full border p-2 mb-2">
        <input id="pass" type="password" placeholder="Password" class="w-full border p-2 mb-3">
        <button onclick="login()" class="w-full bg-blue-600 text-white py-2 rounded">Masuk</button>
        <p id="err" class="text-red-500 text-xs hidden mt-2 text-center">Salah!</p>
    </div>
</div>

<!-- APP -->
<div id="app" class="hidden p-4 max-w-6xl mx-auto">

<h1 class="text-xl font-bold mb-4">E-Penomoran Surat Desa</h1>

<form id="form" class="bg-white p-4 rounded shadow mb-4 grid md:grid-cols-3 gap-3">

<input type="date" id="tgl" required class="border p-2">

<input type="text" id="searchKlas" onkeyup="searchKlas()" placeholder="Cari klasifikasi..." class="border p-2">

<select id="kat" required class="border p-2">
<option value="">-- Pilih Klasifikasi --</option>

<!-- 100 -->
<optgroup label="100 – PEMERINTAHAN UMUM">
<option value="100.01">100.01 Surat Umum</option>
<option value="100.02">100.02 Undangan</option>
<option value="100.03">100.03 Surat Edaran</option>
<option value="100.04">100.04 Nota Dinas</option>
<option value="100.05">100.05 Surat Keterangan</option>
<option value="100.06">100.06 Surat Pernyataan</option>
<option value="100.07">100.07 Surat Pengantar</option>
<option value="110.01">110.01 Keputusan Kepala Desa</option>
<option value="110.02">110.02 Peraturan Kepala Desa</option>
<option value="110.03">110.03 Peraturan Desa</option>
<option value="110.04">110.04 Instruksi Kepala Desa</option>
<option value="110.05">110.05 SK Tim</option>
<option value="110.06">110.06 SK Operator</option>
<option value="110.07">110.07 SK BPD</option>
</optgroup>

<!-- 200 -->
<optgroup label="200 – POLITIK & KEAMANAN">
<option value="200.01">200.01 Umum</option>
<option value="210.01">210.01 Pilkades</option>
<option value="210.02">210.02 Pemilu</option>
<option value="220.01">220.01 Penertiban</option>
<option value="230.01">230.01 Linmas</option>
</optgroup>

<!-- 300 -->
<optgroup label="300 – KEPEGAWAIAN">
<option value="300.01">300.01 Data Kepegawaian</option>
<option value="320.03">320.03 Surat Tugas</option>
<option value="330.03">330.03 Absensi</option>
</optgroup>

<!-- 400 -->
<optgroup label="400 – KESEJAHTERAAN">
<option value="420.01">420.01 Posyandu</option>
<option value="430.02">430.02 BLT</option>
<option value="470.01">470.01 Data Penduduk</option>
<option value="474.01">474.01 Kelahiran</option>
<option value="475.01">475.01 Kematian</option>
</optgroup>

<!-- 500 -->
<optgroup label="500 – PEREKONOMIAN">
<option value="530.01">530.01 UMKM</option>
<option value="530.02">530.02 BUMDes</option>
</optgroup>

<!-- 600 -->
<optgroup label="600 – PEMBANGUNAN">
<option value="620.01">620.01 Jalan</option>
<option value="630.01">630.01 Irigasi</option>
</optgroup>

<!-- 700 -->
<optgroup label="700 – KEUANGAN">
<option value="710.01">710.01 APBDes</option>
<option value="730.02">730.02 LPJ</option>
<option value="750.03">750.03 PBB</option>
</optgroup>

<!-- 800 -->
<optgroup label="800 – PERTANAHAN">
<option value="820.01">820.01 Letter C</option>
<option value="830.01">830.01 Sengketa</option>
</optgroup>

<!-- 900 -->
<optgroup label="900 – LAIN">
<option value="910.01">910.01 Bencana</option>
<option value="930.03">930.03 Digitalisasi</option>
</optgroup>

</select>

<input type="text" id="perihal" placeholder="Perihal" required class="border p-2 md:col-span-2">

<button class="bg-green-600 text-white py-2 rounded md:col-span-3">Simpan</button>

</form>

<!-- TABEL -->
<table class="w-full bg-white rounded shadow text-sm">
<thead class="bg-gray-200">
<tr>
<th class="p-2">No</th>
<th>Tanggal</th>
<th>Kode</th>
<th>Nomor</th>
<th>Perihal</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

<br>

<button onclick="pdf()" class="bg-blue-600 text-white px-4 py-2 rounded">Export PDF</button>

</div>

<script>

let db = JSON.parse(localStorage.getItem('db')) || [];

// LOGIN
function login(){
    if(user.value==="admin" && pass.value==="desa123"){
        login.style.display="none";
        app.style.display="block";
        render();
    } else {
        err.classList.remove('hidden');
    }
}

// AUTO NOMOR
function getNo(){
    let last = db.length ? parseInt(db[0].urut) : 0;
    return String(last+1).padStart(3,'0');
}

// FORM
form.onsubmit = e=>{
    e.preventDefault();

    let urut = getNo();
    let tglVal = tgl.value;
    let kode = kat.value;
    let perihalVal = perihal.value.toUpperCase();

    let d = new Date(tglVal);
    let thn = d.getFullYear();
    let bln = ["","I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII"][d.getMonth()+1];

    let nomor = `${kode}/${urut}/DESA/${bln}/${thn}`;

    if(db.some(x=>x.nomor===nomor)){
        alert("Nomor sudah ada!");
        return;
    }

    db.unshift({urut,tgl:tglVal,kode,nomor,perihal:perihalVal});
    localStorage.setItem('db',JSON.stringify(db));

    form.reset();
    render();
}

// RENDER
function render(){
    data.innerHTML = db.map((d,i)=>`
    <tr>
        <td class="p-2">${d.urut}</td>
        <td>${d.tgl}</td>
        <td>${d.kode}</td>
        <td>${d.nomor}</td>
        <td>${d.perihal}</td>
        <td><button onclick="del(${i})" class="text-red-500">Hapus</button></td>
    </tr>
    `).join('');
}

// HAPUS
function del(i){
    if(confirm("Hapus?")){
        db.splice(i,1);
        localStorage.setItem('db',JSON.stringify(db));
        render();
    }
}

// SEARCH KLASIFIKASI
function searchKlas(){
    let s = searchKlas.value.toUpperCase();
    let opts = kat.options;
    for(let o of opts){
        o.style.display = o.text.toUpperCase().includes(s) ? "" : "none";
    }
}

// PDF
function pdf(){
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    let rows = db.map(d=>[d.urut,d.tgl,d.kode,d.nomor,d.perihal]);

    doc.autoTable({
        head:[["No","Tanggal","Kode","Nomor","Perihal"]],
        body:rows
    });

    doc.save("data.pdf");
}

</script>

</body>
</html>
